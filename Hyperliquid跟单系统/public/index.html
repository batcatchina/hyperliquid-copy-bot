<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Hyperliquid 跟单</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --card: #131318;
      --border: rgba(255,255,255,0.06);
      --text: #e8e8e8;
      --dim: #555;
      --green: #00e676;
      --red: #ff5252;
      --purple: #9c27b0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, 'SF Mono', 'Consolas', monospace;
      min-height: 100vh;
      padding: 14px 12px 40px;
    }
    .wrap { max-width: 420px; margin: 0 auto; }

    /* Header */
    .header-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 14px;
    }
    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .equity {
      font-size: 32px;
      font-weight: 600;
      letter-spacing: -1px;
      color: var(--text);
    }
    .live-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(0,230,118,0.1);
      border: 1px solid rgba(0,230,118,0.2);
      padding: 5px 10px 5px 8px;
      border-radius: 40px;
    }
    .live-dot {
      width: 8px; height: 8px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }
    .live-text { font-size: 12px; color: var(--green); font-weight: 600; }
    .header-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
    }
    .time { font-size: 12px; color: var(--dim); }
    .refresh-btn {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      color: #888;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-family: inherit;
      cursor: pointer;
      transition: 0.15s;
    }
    .refresh-btn:active { background: rgba(255,255,255,0.1); }

    /* Cards */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .card-title {
      font-size: 11px;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .wallet-tag {
      font-size: 10px;
      color: var(--dim);
      background: rgba(255,255,255,0.03);
      padding: 2px 8px;
      border-radius: 10px;
    }

    /* Stats grid */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .stat { display: flex; flex-direction: column; }
    .stat-label { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 2px; }
    .stat-val { font-size: 16px; font-weight: 500; }
    .stat-val.green { color: var(--green); }
    .stat-val.red { color: var(--red); }
    .stat-val.dim { color: #888; }
    .stat.full { grid-column: span 2; }

    /* Positions */
    .pos-list { display: flex; flex-direction: column; }
    .pos-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .pos-row:last-child { border-bottom: none; }
    .pos-coin { font-weight: 600; font-size: 14px; }
    .pos-side {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 10px;
      margin-left: 8px;
    }
    .pos-side.long { background: rgba(0,230,118,0.12); color: var(--green); }
    .pos-side.short { background: rgba(255,82,82,0.12); color: var(--red); }
    .pos-right { text-align: right; }
    .pos-size { font-size: 13px; }
    .pos-price { font-size: 11px; color: var(--dim); }
    .pos-pnl { font-size: 13px; font-weight: 500; margin-top: 2px; }
    .pos-pnl.pos { color: var(--green); }
    .pos-pnl.neg { color: var(--red); }

    /* Fills */
    .fill-list { display: flex; flex-direction: column; }
    .fill-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      font-size: 12px;
    }
    .fill-row:last-child { border-bottom: none; }
    .fill-time { color: var(--dim); font-size: 11px; min-width: 50px; }
    .fill-coin { font-weight: 500; min-width: 40px; }
    .fill-dir { font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 6px; }
    .fill-dir.buy { background: rgba(0,230,118,0.12); color: var(--green); }
    .fill-dir.sell { background: rgba(255,82,82,0.12); color: var(--red); }
    .fill-info { text-align: right; }
    .fill-size { }
    .fill-price { color: var(--dim); font-size: 11px; }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 20px 0 12px;
      color: var(--purple);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(156,39,176,0.2);
    }

    /* Loading */
    .loading {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(10,10,15,0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .loading.active { opacity: 1; pointer-events: auto; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.06);
      border-top-color: var(--purple);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error */
    .error {
      background: rgba(255,82,82,0.1);
      border: 1px solid rgba(255,82,82,0.2);
      color: var(--red);
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 12px;
      margin-bottom: 12px;
      display: none;
    }
    .error.show { display: block; }

    /* Empty state */
    .empty { color: var(--dim); font-size: 13px; padding: 4px 0; }

    /* Target wallet header */
    .target-header {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--purple);
    }
  </style>
</head>
<body>
<div class="wrap">

  <!-- Loading -->
  <div class="loading" id="loading"><div class="spinner"></div></div>

  <!-- Error -->
  <div class="error" id="error"></div>

  <!-- Header -->
  <div class="header-card">
    <div class="header-top">
      <div class="equity" id="headerEquity">$—</div>
      <div class="live-badge">
        <span class="live-dot"></span>
        <span class="live-text">LIVE</span>
      </div>
    </div>
    <div class="header-bottom">
      <span class="time" id="liveTime">—</span>
      <button class="refresh-btn" id="refreshBtn">⟳ 刷新</button>
    </div>
  </div>

  <!-- Account Overview -->
  <div class="card">
    <div class="card-title">
      <span>💰 账户概览</span>
      <span class="wallet-tag">0xdAEb…08a5</span>
    </div>
    <div class="stats-grid">
      <div class="stat">
        <span class="stat-label">净值</span>
        <span class="stat-val green" id="accEquity">—</span>
      </div>
      <div class="stat">
        <span class="stat-label">持仓总额</span>
        <span class="stat-val" id="accPosValue">—</span>
      </div>
      <div class="stat">
        <span class="stat-label">保证金</span>
        <span class="stat-val" id="accMargin">—</span>
      </div>
      <div class="stat">
        <span class="stat-label">总盈亏</span>
        <span class="stat-val" id="accPnl">—</span>
      </div>
      <div class="stat full">
        <span class="stat-label">可提款</span>
        <span class="stat-val dim" id="accWithdrawable">—</span>
      </div>
    </div>
  </div>

  <!-- My Positions -->
  <div class="card">
    <div class="card-title"><span>📊 我的持仓</span><span id="myPosCount">0</span></div>
    <div class="pos-list" id="myPositions"><div class="empty">暂无持仓</div></div>
  </div>

  <!-- Real Fills -->
  <div class="card">
    <div class="card-title"><span>📋 实盘成交</span><span>最近10条</span></div>
    <div class="fill-list" id="myFills"><div class="empty">暂无成交</div></div>
  </div>

  <!-- Divider -->
  <div class="divider">📡 信号源</div>

  <!-- Target Overview -->
  <div class="card">
    <div class="card-title">
      <span class="target-header">🎯 目标钱包</span>
      <span class="wallet-tag">0x3Db8…e5ef</span>
    </div>
    <div class="stats-grid">
      <div class="stat">
        <span class="stat-label">净值</span>
        <span class="stat-val green" id="tgtEquity">—</span>
      </div>
      <div class="stat">
        <span class="stat-label">持仓总额</span>
        <span class="stat-val" id="tgtPosValue">—</span>
      </div>
      <div class="stat">
        <span class="stat-label">保证金</span>
        <span class="stat-val" id="tgtMargin">—</span>
      </div>
      <div class="stat">
        <span class="stat-label">总盈亏</span>
        <span class="stat-val" id="tgtPnl">—</span>
      </div>
      <div class="stat full">
        <span class="stat-label">可提款</span>
        <span class="stat-val dim" id="tgtWithdrawable">—</span>
      </div>
    </div>
  </div>

  <!-- Target Positions -->
  <div class="card">
    <div class="card-title"><span>📊 目标持仓</span><span id="tgtPosCount">0</span></div>
    <div class="pos-list" id="tgtPositions"><div class="empty">暂无持仓</div></div>
  </div>

  <!-- Target Fills -->
  <div class="card">
    <div class="card-title"><span>📋 信号源成交</span><span>最近10条</span></div>
    <div class="fill-list" id="tgtFills"><div class="empty">暂无成交</div></div>
  </div>

</div>

<script>
(function() {
  const TARGET = '0x3Db8f7bC6D744bEAE458207C85F46B5d0349e5ef';
  const USER = '0xdAEb07e164D788CB14DbFfa7581170f9a3EB08a5';
  const API = 'https://api.hyperliquid.xyz/info';
  const REFRESH_MS = 10000;

  function $(id) { return document.getElementById(id); }
  function fmt(v, d = 2) {
    if (v === null || v === undefined || isNaN(v)) return '—';
    const s = v >= 0 ? '' : '-';
    return s + '$' + Math.abs(v).toFixed(d);
  }
  function fmtQty(v, d = 4) {
    if (v === null || v === undefined || isNaN(v)) return '—';
    return Math.abs(v).toFixed(d);
  }
  function fmtTime(ts) {
    if (!ts) return '—';
    return new Date(ts).toLocaleTimeString('zh-CN', { hour12: false });
  }

  async function hlPost(body) {
    const r = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    return r.json();
  }

  function setLoading(on) {
    $('loading').classList.toggle('active', on);
  }
  function showError(msg) {
    const el = $('error');
    el.textContent = '⚠️ ' + msg;
    el.classList.add('show');
  }
  function clearError() {
    $('error').classList.remove('show');
  }

  function renderAccountOverview(data, prefix) {
    const margin = data.marginSummary || {};
    const eq = parseFloat(margin.accountValue || 0);
    const posVal = parseFloat(margin.totalNtlPos || 0);
    const marginUsed = parseFloat(margin.totalMarginUsed || 0);
    const rawUsd = parseFloat(margin.totalRawUsd || 0);
    const withdrawable = parseFloat(data.withdrawable || 0);
    const pnlColor = rawUsd >= 0 ? 'green' : 'red';

    $(prefix + 'Equity').textContent = fmt(eq);
    $(prefix + 'PosValue').textContent = fmt(posVal);
    $(prefix + 'Margin').textContent = fmt(marginUsed);
    const pnlEl = $(prefix + 'Pnl');
    pnlEl.textContent = fmt(rawUsd);
    pnlEl.className = 'stat-val ' + pnlColor;
    $(prefix + 'Withdrawable').textContent = fmt(withdrawable);
    return eq;
  }

  function renderPositions(positions, allMids, container, countEl) {
    if (!positions || positions.length === 0) {
      container.innerHTML = '<div class="empty">暂无持仓</div>';
      countEl.textContent = '0';
      return;
    }
    countEl.textContent = positions.length;
    let html = '';
    for (const ap of positions) {
      const p = ap.position || ap;
      const coin = p.coin;
      const szi = parseFloat(p.szi || 0);
      const entryPx = parseFloat(p.entryPx || 0);
      const mid = parseFloat(allMids[coin] || entryPx);
      const unrealPnl = parseFloat(p.unrealizedPnl || 0);
      const isLong = szi >= 0;
      const pnlClass = unrealPnl >= 0 ? 'pos' : 'neg';
      html += `<div class="pos-row">
        <div>
          <span class="pos-coin">${coin}</span>
          <span class="pos-side ${isLong ? 'long' : 'short'}">${isLong ? '多' : '空'}</span>
        </div>
        <div class="pos-right">
          <div class="pos-size">${fmtQty(szi)}</div>
          <div class="pos-price">${fmt(entryPx, 4)} → ${fmt(mid, 4)}</div>
          <div class="pos-pnl ${pnlClass}">${fmt(unrealPnl)}</div>
        </div>
      </div>`;
    }
    container.innerHTML = html;
  }

  function renderFills(fills, container) {
    if (!fills || fills.length === 0) {
      container.innerHTML = '<div class="empty">暂无成交</div>';
      return;
    }
    const recent = fills.slice(-10).reverse();
    let html = '';
    for (const f of recent) {
      const isBuy = f.side === 'B';
      html += `<div class="fill-row">
        <span class="fill-time">${fmtTime(f.time)}</span>
        <span class="fill-coin">${f.coin || '—'}</span>
        <span class="fill-dir ${isBuy ? 'buy' : 'sell'}">${isBuy ? 'B' : 'S'}</span>
        <div class="fill-info">
          <span class="fill-size">${fmtQty(parseFloat(f.sz || f.size || 0))}</span>
          <span class="fill-price">@ ${fmt(parseFloat(f.px || f.price || 0), 4)}</span>
        </div>
      </div>`;
    }
    container.innerHTML = html;
  }

  async function fetchAll() {
    clearError();
    try {
      const [userState, userFills, tgtState, tgtFills, allMids] = await Promise.all([
        hlPost({ type: 'clearinghouseState', user: USER }),
        hlPost({ type: 'userFills', user: USER }),
        hlPost({ type: 'clearinghouseState', user: TARGET }),
        hlPost({ type: 'userFills', user: TARGET }),
        hlPost({ type: 'allMids' })
      ]);

      // Header equity
      const margin = userState?.marginSummary || {};
      const eq = parseFloat(margin.accountValue || 0);
      $('headerEquity').textContent = fmt(eq);

      // Account
      if (userState) renderAccountOverview(userState, 'acc');

      // My positions
      const myPos = (userState?.assetPositions || []).filter(ap => {
        const sz = parseFloat(ap?.position?.szi || 0);
        return Math.abs(sz) > 0.0001;
      });
      renderPositions(myPos, allMids, $('myPositions'), $('myPosCount'));

      // My fills
      const myF = Array.isArray(userFills) ? userFills : (userFills?.fills || []);
      renderFills(myF, $('myFills'));

      // Target
      if (tgtState) renderAccountOverview(tgtState, 'tgt');

      // Target positions
      const tgtPos = (tgtState?.assetPositions || []).filter(ap => {
        const sz = parseFloat(ap?.position?.szi || 0);
        return Math.abs(sz) > 0.0001;
      });
      renderPositions(tgtPos, allMids, $('tgtPositions'), $('tgtPosCount'));

      // Target fills
      const tf = Array.isArray(tgtFills) ? tgtFills : (tgtFills?.fills || []);
      renderFills(tf, $('tgtFills'));

      // Time
      $('liveTime').textContent = new Date().toLocaleTimeString('zh-CN', { hour12: false });
    } catch (e) {
      showError(e.message || 'API 请求失败');
    }
  }

  let refreshing = false;
  async function refresh() {
    if (refreshing) return;
    refreshing = true;
    $('refreshBtn').textContent = '…';
    await fetchAll();
    $('refreshBtn').textContent = '⟳ 刷新';
    refreshing = false;
  }

  $('refreshBtn').addEventListener('click', refresh);
  setLoading(true);
  fetchAll().finally(() => setLoading(false));
  setInterval(fetchAll, REFRESH_MS);
})();
</script>
</body>
</html>
