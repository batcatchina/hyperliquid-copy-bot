<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Hyperliquid 跟单 Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg: #0f0f0f;
      --card-bg: #1a1a1a;
      --border: #2a2a2a;
      --text: #e0e0e0;
      --text-dim: #888;
      --purple: #c084fc;
      --green: #00ff88;
      --red: #ff5252;
      --yellow: #ffb800;
    }
    
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      min-height: 100vh;
      padding: 12px;
    }
    
    .container {
      max-width: 600px;
      margin: 0 auto;
    }
    
    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0 16px;
    }
    
    .header h1 {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
    }
    
    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .last-update {
      font-size: 11px;
      color: var(--text-dim);
    }
    
    .refresh-btn {
      background: var(--purple);
      color: #000;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    
    .refresh-btn:hover { opacity: 0.8; }
    .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    
    /* Badge */
    .badge-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    
    .badge-sim {
      background: var(--purple);
      color: #000;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    
    .badge-label {
      font-size: 13px;
      color: var(--text-dim);
    }
    
    /* Cards */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 12px;
    }
    
    .card-title {
      font-size: 11px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }
    
    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    
    .stat-item {
      background: rgba(255,255,255,0.03);
      border-radius: 8px;
      padding: 10px;
      text-align: center;
    }
    
    .stat-label {
      font-size: 10px;
      color: var(--text-dim);
      margin-bottom: 4px;
    }
    
    .stat-value {
      font-size: 15px;
      font-weight: 600;
    }
    
    .stat-value.green { color: var(--green); }
    .stat-value.red { color: var(--red); }
    .stat-value.yellow { color: var(--yellow); }
    .stat-value.purple { color: var(--purple); }
    
    /* Positions Table */
    .pos-table {
      width: 100%;
      font-size: 12px;
    }
    
    .pos-table th {
      color: var(--text-dim);
      font-weight: 500;
      text-align: left;
      padding: 6px 4px;
      border-bottom: 1px solid var(--border);
      font-size: 10px;
    }
    
    .pos-table td {
      padding: 8px 4px;
      border-bottom: 1px solid var(--border);
    }
    
    .pos-table tr:last-child td { border-bottom: none; }
    
    .pos-long { background: rgba(0,255,136,0.05); }
    .pos-short { background: rgba(255,82,82,0.05); }
    
    .coin-name { font-weight: 600; }
    
    .side-buy { color: var(--green); }
    .side-sell { color: var(--red); }
    
    .pnl-pos { color: var(--green); }
    .pnl-neg { color: var(--red); }
    
    /* Divider */
    .divider {
      text-align: center;
      padding: 20px 0;
      color: var(--text-dim);
      font-size: 12px;
      letter-spacing: 2px;
    }
    
    /* Summary Row */
    .summary-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    
    .summary-row:last-child { border-bottom: none; }
    .summary-label { color: var(--text-dim); }
    
    /* Fills Table */
    .fills-table {
      width: 100%;
      font-size: 11px;
    }
    
    .fills-table th {
      color: var(--text-dim);
      font-weight: 500;
      text-align: left;
      padding: 6px 4px;
      border-bottom: 1px solid var(--border);
      font-size: 10px;
    }
    
    .fills-table td {
      padding: 7px 4px;
      border-bottom: 1px solid var(--border);
    }
    
    /* Loading & Error */
    .loading-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      font-size: 14px;
      color: var(--purple);
    }
    
    .error-msg {
      background: rgba(255,82,82,0.15);
      border: 1px solid var(--red);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      font-size: 12px;
      color: var(--red);
    }
    
    .no-data {
      text-align: center;
      padding: 20px;
      color: var(--text-dim);
      font-size: 12px;
    }
    
    /* Status dot */
    .status-dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      margin-right: 6px;
      animation: blink 1.5s infinite;
    }
    
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    
    .live-indicator {
      font-size: 11px;
      color: var(--text-dim);
      display: flex;
      align-items: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <h1>Hyperliquid 跟单</h1>
      <div class="header-right">
        <span class="live-indicator"><span class="status-dot"></span>LIVE</span>
        <span class="last-update" id="lastUpdate">--:--:--</span>
        <button class="refresh-btn" id="refreshBtn" onclick="refreshAll()">刷新</button>
      </div>
    </div>
    
    <!-- Error Container -->
    <div id="errorContainer"></div>
    
    <!-- Real Account Fills -->
    <div class="card">
      <div class="card-title">📜 实盘成交记录</div>
    <!-- User Account Summary -->
    <div class="card">
      <div class="card-title">📊 账户概览</div>
      <div id="accountSummary">
        <div class="no-data">加载中...</div>
      </div>
    </div>

    <!-- User Account Positions -->
    <div class="card">
      <div class="card-title">📋 账户持仓</div>
      <div id="accountPositions">
        <div class="no-data">加载中...</div>
      </div>
    </div>

      <div id="userFillsContainer">
        <div class="no-data">加载中...</div>
      </div>
    </div>

    <!-- Divider -->
    <div class="divider">—— 目标钱包 ——</div>
    
    <!-- Target Wallet Overview -->
    <div class="card">
      <div class="card-title">👛 目标钱包账户概览</div>
      <div id="targetOverview">
        <div class="no-data">加载中...</div>
      </div>
    </div>
    
    <!-- Target Positions -->
    <div class="card">
      <div class="card-title">📋 目标持仓（最多8条）</div>
      <div id="targetPositionsContainer">
        <div class="no-data">加载中...</div>
      </div>
    </div>
    
    <!-- Recent Fills -->
    <div class="card">
      <div class="card-title">📜 最近成交（最近10条）</div>
      <div id="fillsContainer">
        <div class="no-data">加载中...</div>
      </div>
    </div>
  </div>
  
  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loadingOverlay" style="display:none;">
    <span>🔄 数据加载中...</span>
  </div>

  <script>
    // ============ CONFIG ============
    const TARGET_WALLET = '0x3Db8f7bC6D744bEAE458207C85F46B5d0349e5ef';
    const USER_WALLET = '0xdAEb07e164D788CB14DbFfa7581170f9a3EB08a5';
    const POLL_INTERVAL = 10000; // 10 seconds
    const HL_API = 'https://api.hyperliquid.xyz/info';
    
    // ============ HELPER FUNCTIONS ============
    function formatNum(n, decimals = 2) {
      if (n === null || n === undefined || isNaN(n)) return '--';
      const sign = n >= 0 ? '' : '-';
      return sign + '$' + Math.abs(n).toFixed(decimals);
    }
    
    function formatQty(n, decimals = 4) {
      if (n === null || n === undefined || isNaN(n)) return '--';
      return Math.abs(n).toFixed(decimals);
    }
    
    function formatTime(isoStr) {
      if (!isoStr) return '--';
      try {
        const d = new Date(isoStr);
        return d.toLocaleTimeString('zh-CN', { hour12: false });
      } catch {
        return isoStr;
      }
    }
    
    function timeAgo(isoStr) {
      if (!isoStr) return '--';
      try {
        const d = new Date(isoStr);
        const now = new Date();
        const diff = Math.floor((now - d) / 1000);
        if (diff < 60) return diff + 's ago';
        if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
        if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
        return Math.floor(diff / 86400) + 'd ago';
      } catch {
        return isoStr;
      }
    }
    
    function showError(msg) {
      document.getElementById('errorContainer').innerHTML = 
        `<div class="error-msg">⚠️ ${msg}</div>`;
    }
    
    function clearErrors() {
      document.getElementById('errorContainer').innerHTML = '';
    }
    
    function setLoading(on) {
      document.getElementById('loadingOverlay').style.display = on ? 'flex' : 'none';
    }
    
    function updateLastTime() {
      document.getElementById('lastUpdate').textContent = 
        new Date().toLocaleTimeString('zh-CN', { hour12: false });
    }
    
    // ============ API CALLS ============
    async function hlPost(body) {
      const resp = await fetch(HL_API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      return resp.json();
    }
    

    // ============ RENDER ACCOUNT SUMMARY ============
    async function fetchAndRenderAccountSummary() {
      try {
        const data = await hlPost({ type: 'clearinghouseState', user: USER_WALLET });
        const margin = data.marginSummary || {};
        const accountValue = parseFloat(margin.accountValue || 0);
        const totalPos = parseFloat(margin.totalNtlPos || 0);
        const marginUsed = parseFloat(margin.totalMarginUsed || 0);
        const withdrawable = parseFloat(data.withdrawable || 0);
        const rawUsd = parseFloat(margin.totalRawUsd || 0);
        const pnl = rawUsd; // 总体PnL

        const html = `
          <div class="stats-grid">
            <div class="stat-item">
              <div class="stat-label">账户净值</div>
              <div class="stat-value green">${formatNum(accountValue)}</div>
            </div>
            <div class="stat-item">
              <div class="stat-label">持仓总额</div>
              <div class="stat-value">${formatNum(totalPos)}</div>
            </div>
            <div class="stat-item">
              <div class="stat-label">保证金使用</div>
              <div class="stat-value yellow">${formatNum(marginUsed)}</div>
            </div>
            <div class="stat-item">
              <div class="stat-label">总盈亏</div>
              <div class="stat-value ${pnl >= 0 ? 'green' : 'red'}">${formatNum(pnl)}</div>
            </div>
            <div class="stat-item">
              <div class="stat-label">可提款</div>
              <div class="stat-value">${formatNum(withdrawable)}</div>
            </div>
            <div class="stat-item">
              <div class="stat-label">账户状态</div>
              <div class="stat-value green">● 正常</div>
            </div>
          </div>
        `;
        document.getElementById('accountSummary').innerHTML = html;
      } catch (e) {
        document.getElementById('accountSummary').innerHTML = 
          '<div class="no-data">暂无数据</div>';
      }
    }

    // ============ RENDER ACCOUNT POSITIONS ============
    async function fetchAndRenderAccountPositions() {
      try {
        const data = await hlPost({ type: 'clearinghouseState', user: USER_WALLET });
        const positions = data.assetPositions || [];
        const allMids = await hlPost({ type: 'allMids' });

        if (positions.length === 0) {
          document.getElementById('accountPositions').innerHTML = 
            '<div class="no-data">暂无持仓</div>';
          return;
        }

        let html = `<div class="positions-table-wrap"><table class="positions-table"><thead><tr>
          <th>币种</th><th>方向</th><th>数量</th><th>开仓价</th><th>当前价</th><th>未实现</th>
        </tr></thead><tbody>`;

        for (const pos of positions) {
          const p = pos.position || pos;
          const coin = p.coin;
          const mid = parseFloat(allMids[coin] || 0);
          const entryPx = parseFloat(p.entryPx || 0);
          const unrealizedPnl = parseFloat(p.unrealizedPnl || 0);
          const roe = parseFloat(p.returnOnEquity || 0) * 100;
          const side = parseFloat(p.szi) >= 0 ? '多' : '空';
          const sideClass = side === '多' ? 'green' : 'red';
          const pnlClass = unrealizedPnl >= 0 ? 'green' : 'red';
          const size = formatQty(Math.abs(parseFloat(p.szi)));
          const currentPx = formatNum(mid, 4);
          const entryStr = formatNum(entryPx, 4);

          html += `<tr>
            <td class="coin-name">${coin}</td>
            <td class="${sideClass}">${side}</td>
            <td>${size}</td>
            <td>${entryStr}</td>
            <td>${currentPx}</td>
            <td class="${pnlClass}">${formatNum(unrealizedPnl)} (${roe.toFixed(2)}%)</td>
          </tr>`;
        }

        html += '</tbody></table></div>';
        document.getElementById('accountPositions').innerHTML = html;
      } catch (e) {
        document.getElementById('accountPositions').innerHTML = 
          '<div class="no-data">暂无持仓</div>';
      }
    }

    // ============ RENDER USER (REAL ACCOUNT) FILLS ============
    async function fetchAndRenderUserFills() {
      try {
        const userFills = await hlPost({ type: 'userFills', user: USER_WALLET });
        const fills = userFills.fills || [];
        const container = document.getElementById('userFillsContainer');

        if (fills.length === 0) {
          container.innerHTML = '<div class="no-data">暂无成交</div>';
        } else {
          const recentFills = fills.slice(-10).reverse();
          let html = `
            <table class="fills-table">
              <thead>
                <tr>
                  <th>时间</th>
                  <th>方向</th>
                  <th>资产</th>
                  <th>数量</th>
                  <th>价格</th>
                </tr>
              </thead>
              <tbody>
          `;
          for (const fill of recentFills) {
            const sideClass = fill.side === 'B' ? 'side-buy' : 'side-sell';
            const sideText = fill.side === 'B' ? 'BUY' : 'SELL';
            const time = formatTime(fill.time);
            html += `
              <tr>
                <td>${time}</td>
                <td class="${sideClass}">${sideText}</td>
                <td>${fill.coin || '--'}</td>
                <td>${formatQty(parseFloat(fill.size || 0))}</td>
                <td>${formatNum(parseFloat(fill.price || 0), 4)}</td>
              </tr>
            `;
          }
          html += '</tbody></table>';
          container.innerHTML = html;
        }
      } catch (err) {
        console.error('User fills error:', err);
        document.getElementById('userFillsContainer').innerHTML =
          `<div class="no-data" style="color:var(--red)">成交加载失败</div>`;
      }
    }

    // ============ RENDER TARGET WALLET ============
    async function fetchAndRenderTargetWallet() {
      try {
        const [clearinghouse, allMids, userFills] = await Promise.all([
          hlPost({ type: 'clearinghouseState', user: TARGET_WALLET }),
          hlPost({ type: 'allMids' }),
          hlPost({ type: 'userFills', user: TARGET_WALLET })
        ]);
        
        clearErrors();
        
        // Overview
        const margin = clearinghouse.marginSummary || {};
        const accountValue = parseFloat(margin.accountValue || 0);
        const totalMarginUsed = parseFloat(margin.totalMarginUsed || 0);
        const withdrawable = parseFloat(clearinghouse.withdrawable || 0);
        
        document.getElementById('targetOverview').innerHTML = `
          <div class="summary-row">
            <span class="summary-label">账户净值</span>
            <span style="color:var(--green)">${formatNum(accountValue)}</span>
          </div>
          <div class="summary-row">
            <span class="summary-label">保证金使用</span>
            <span style="color:var(--yellow)">${formatNum(totalMarginUsed)}</span>
          </div>
          <div class="summary-row">
            <span class="summary-label">可提取</span>
            <span>${formatNum(withdrawable)}</span>
          </div>
        `;
        
        // Positions
        const assetPositions = clearinghouse.assetPositions || [];
        const container = document.getElementById('targetPositionsContainer');
        
        if (assetPositions.length === 0) {
          container.innerHTML = '<div class="no-data">暂无持仓</div>';
        } else {
          let html = `
            <table class="pos-table">
              <thead>
                <tr>
                  <th>资产</th>
                  <th>方向</th>
                  <th>数量</th>
                  <th>开仓价</th>
                  <th>当前价</th>
                  <th>未实现</th>
                </tr>
              </thead>
              <tbody>
          `;
          
          const positionsToShow = assetPositions.slice(0, 8);
          
          for (const assetPos of positionsToShow) {
            const pos = assetPos.position;
            const coin = pos.coin;
            const size = parseFloat(pos.szi || 0);
            const isLong = size >= 0;
            const rowClass = isLong ? 'pos-long' : 'pos-short';
            const sideClass = isLong ? 'side-buy' : 'side-sell';
            const sideText = isLong ? 'BUY' : 'SELL';
            const entryPx = parseFloat(pos.entryPx || 0);
            const currentPx = allMids && allMids[coin] ? parseFloat(allMids[coin]) : entryPx;
            const unrealPnl = parseFloat(pos.unrealizedPnl || 0);
            const pnlClass = unrealPnl >= 0 ? 'pnl-pos' : 'pnl-neg';
            
            html += `
              <tr class="${rowClass}">
                <td class="coin-name">${coin}</td>
                <td class="${sideClass}">${sideText}</td>
                <td>${formatQty(size)}</td>
                <td>${formatNum(entryPx, 4)}</td>
                <td>${formatNum(currentPx, 4)}</td>
                <td class="${pnlClass}">${formatNum(unrealPnl)}</td>
              </tr>
            `;
          }
          
          html += '</tbody></table>';
          container.innerHTML = html;
        }
        
        // Fills
        const fills = userFills.fills || [];
        const fillsContainer = document.getElementById('fillsContainer');
        
        if (fills.length === 0) {
          fillsContainer.innerHTML = '<div class="no-data">暂无成交</div>';
        } else {
          const recentFills = fills.slice(-10).reverse();
          
          let html = `
            <table class="fills-table">
              <thead>
                <tr>
                  <th>时间</th>
                  <th>方向</th>
                  <th>资产</th>
                  <th>数量</th>
                  <th>价格</th>
                </tr>
              </thead>
              <tbody>
          `;
          
          for (const fill of recentFills) {
            const sideClass = fill.side === 'B' ? 'side-buy' : 'side-sell';
            const sideText = fill.side === 'B' ? 'BUY' : 'SELL';
            const time = formatTime(fill.time);
            
            html += `
              <tr>
                <td>${time}</td>
                <td class="${sideClass}">${sideText}</td>
                <td>${fill.coin || '--'}</td>
                <td>${formatQty(parseFloat(fill.size || 0))}</td>
                <td>${formatNum(parseFloat(fill.price || 0), 4)}</td>
              </tr>
            `;
          }
          
          html += '</tbody></table>';
          fillsContainer.innerHTML = html;
        }
        
        
      } catch (err) {
        console.error('Target wallet fetch error:', err);
        showError(`加载目标钱包数据失败: ${err.message}`);
      }
    }
    
    // ============ MAIN REFRESH ============
    let isRefreshing = false;
    
    async function refreshAll() {
      if (isRefreshing) return;
      isRefreshing = true;
      
      const btn = document.getElementById('refreshBtn');
      btn.disabled = true;
      btn.textContent = '刷新中...';
      
      try {
        await fetchAndRenderUserFills();
        await fetchAndRenderTargetWallet();
        updateLastTime();
      } catch (err) {
        console.error('Refresh error:', err);
        showError(`刷新失败: ${err.message}`);
      } finally {
        isRefreshing = false;
        btn.disabled = false;
        btn.textContent = '刷新';
      }
    }
    
    // ============ INIT ============
    async function init() {
      setLoading(true);
      await refreshAll();
      setLoading(false);
      
      // Auto poll every 10 seconds
      setInterval(refreshAll, POLL_INTERVAL);
    }
    
    // Start
    init();
  </script>
</body>
</html>
